<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Table Example</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2 class="mb-4">Employee Data</h2>
    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Employee ID</th>
                    <th>Name</th>
                    <th>Position</th>
                    <th>Department</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Table content will be populated by JavaScript -->
            </tbody>
        </table>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Sample data
        const employees = [
            { id: "EMP001", name: "John Smith", position: "Software Engineer", department: "Engineering" },
            { id: "EMP002", name: "Sarah Johnson", position: "Product Manager", department: "Product" },
            { id: "EMP003", name: "Michael Brown", position: "UI Designer", department: "Design" },
            { id: "EMP004", name: "Emily Davis", position: "Data Analyst", department: "Analytics" },
            { id: "EMP005", name: "James Wilson", position: "DevOps Engineer", department: "Operations" },
            { id: "EMP006", name: "Lisa Anderson", position: "Marketing Lead", department: "Marketing" },
            { id: "EMP007", name: "Robert Taylor", position: "Sales Director", department: "Sales" }
        ];

        // Function to populate table
        function populateTable() {
            const tableBody = document.getElementById('tableBody');
            employees.forEach(employee => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${employee.id}</td>
                    <td>${employee.name}</td>
                    <td>${employee.position}</td>
                    <td>${employee.department}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        // Call the function when the page loads
        window.onload = populateTable;
    </script>
</body>
</html>
